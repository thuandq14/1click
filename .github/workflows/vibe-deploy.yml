name: Vibe Deploy - Build and Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production
          CI: false

      - name: Verify build output
        run: |
          test -d "dist" || (echo "Missing build dir: dist" && exit 1)
          find "dist" -maxdepth 2 | head -50

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 112-213-89-72.cprapid.com
          username: vibe_6f43be1d@pago.vn
          password: b65375231022134a0a73bab8
          local-dir: ./dist/
          server-dir: /
          exclude: |
            **/.git*
            **/node_modules/**
            **/.DS_Store